name: Update UPM Branch

on:
  push:
    branches:
      - main

jobs:
  split-upm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Export UPM Branch
        uses: RageAgainstThePixel/upm-subtree-split@v1.1.6
        with:
          path: "Packages/com.wellz.utils" 
          
          branch: "upm"
          
          tag-prefix: "upm/"